<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mondo È Mio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 36px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Sfondi ── */
    .bg-img {
      position: fixed;
      inset: 0;
      background: url('scala.jpg') center 30% / cover no-repeat;
      transform: scaleX(1.6);
      filter: brightness(0.38) saturate(1.2);
      z-index: 0;
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 65% 50% at 18% 65%, rgba(200,80,0,0.28) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 82% 35%, rgba(220,120,0,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 50% 15%, rgba(255,160,20,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 70% 75%, rgba(180,60,0,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 85% 85% at 50% 50%, rgba(7,5,14,0.20) 0%, rgba(7,5,14,0.78) 100%);
      animation: nebulaBreath 14s ease-in-out infinite alternate;
    }

    @keyframes nebulaBreath {
      0%   { opacity: 1; }
      50%  { opacity: 0.80; }
      100% { opacity: 1; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse 88% 88% at 50% 50%,
        transparent 25%, rgba(4,2,10,0.72) 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    /* ── Layout principale ── */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Data ── */
    .date-line {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.6);
      margin-bottom: 4px;
      text-align: center;
    }

    .day-line {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: rgba(200,169,110,0.35);
      text-align: center;
      margin-bottom: 18px;
    }

    /* ── Percentuale ── */
    .pct {
      display: flex;
      align-items: flex-start;
      line-height: 1;
      margin-bottom: 16px;
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(255,184,48,0.75)) drop-shadow(0 0 50px rgba(255,120,0,0.3)); }
      50%       { filter: drop-shadow(0 0 28px rgba(255,215,70,1))    drop-shadow(0 0 80px rgba(255,120,0,0.5)); }
    }

    .pct-num {
      font-size: clamp(2.8rem, 9vw, 5rem);
      font-weight: 100;
      letter-spacing: -0.03em;
      color: #f0d060;
      text-shadow:
        0 0 12px rgba(255,215,70,1),
        0 0 35px rgba(255,175,20,0.7),
        0 0 70px rgba(255,100,0,0.35);
    }

    .pct-sym {
      font-size: clamp(1.1rem, 3.5vw, 1.9rem);
      font-weight: 200;
      color: #e8a040;
      padding-top: 0.45rem;
      opacity: 0.85;
    }

    /* ── Griglia punti ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      width: 100%;
      margin-bottom: 24px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(200,169,110,0.10);
      border: 1.5px solid rgba(200,169,110,0.30);
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    }

    .dot:hover {
      background: rgba(255,184,48,0.30);
      border-color: rgba(255,184,48,0.75);
      transform: scale(1.4);
      box-shadow: 0 0 8px rgba(255,184,48,0.5);
    }

    .dot.done {
      background: radial-gradient(circle at 35% 35%, #ffe066, #ffb830);
      border-color: #f0d060;
      box-shadow:
        0 0 4px  rgba(255,184,48,1),
        0 0 10px rgba(255,184,48,0.55),
        0 0 18px rgba(255,120,0,0.22);
    }

    .dot.today:not(.done) {
      background: rgba(255,184,48,0.20);
      border-color: #ffb830;
      animation: ring 2.8s ease-in-out infinite;
    }

    .dot.today.done {
      animation: goldring 2.8s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,48,0.6); }
      50%       { box-shadow: 0 0 0 3px rgba(255,184,48,0.15), 0 0 12px rgba(255,184,48,0.7); }
    }

    @keyframes goldring {
      0%, 100% { box-shadow: 0 0 6px rgba(255,184,48,1), 0 0 14px rgba(255,184,48,0.55), 0 0 28px rgba(255,120,0,0.3); }
      50%       { box-shadow: 0 0 10px rgba(255,215,70,1), 0 0 28px rgba(255,184,48,0.8), 0 0 50px rgba(255,120,0,0.45); }
    }

    /* ── Separatore ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,169,110,0.25), transparent);
      margin-bottom: 20px;
    }

    /* ── Checklist sezione ── */
    .checklist-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.60rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.50);
      margin-bottom: 12px;
      align-self: flex-start;
    }

    .task-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(200,169,110,0.12);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { opacity: 0.65; }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1.5px solid rgba(200,169,110,0.40);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s;
    }

    .task-item.done .circle {
      border-color: #f0d060;
      background: #f0d060;
    }

    .check-svg { opacity: 0; transition: opacity 0.2s; }
    .task-item.done .check-svg { opacity: 1; }

    .task-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.88rem;
      color: rgba(240,208,96,0.88);
      flex: 1;
      line-height: 1.4;
      transition: color 0.25s;
    }

    .task-item.done .task-text {
      color: rgba(200,169,110,0.35);
      text-decoration: line-through;
      text-decoration-color: rgba(200,169,110,0.30);
    }

    .empty-state {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 6px 0 10px;
      color: rgba(200,169,110,0.30);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }

    /* ── Input ── */
    .input-row {
      display: flex;
      align-items: center;
      width: 100%;
      border-bottom: 1px solid rgba(200,169,110,0.22);
      padding-bottom: 8px;
      margin-bottom: 24px;
      transition: border-color 0.25s;
    }

    .input-row:focus-within { border-color: rgba(200,169,110,0.6); }

    .task-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: rgba(240,208,96,0.8);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      padding: 4px 0;
      caret-color: #f0d060;
    }

    .task-input::placeholder { color: rgba(200,169,110,0.28); }

    .add-btn {
      background: none;
      border: none;
      color: rgba(200,169,110,0.50);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }

    .add-btn:hover { color: #f0d060; }

    /* ── Schermata tutto fatto ── */
    .done-screen {
      display: none;
      text-align: center;
      padding: 16px 0 20px;
      width: 100%;
    }

    .done-screen.visible {
      display: block;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .done-icon {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #f0d060;
      filter: drop-shadow(0 0 8px rgba(255,184,48,0.8));
    }

    .done-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.88rem;
      color: rgba(240,208,96,0.85);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    .done-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.62rem;
      color: rgba(200,169,110,0.38);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    /* ── Bottone Segna oggi ── */
    .btn {
      position: relative;
      padding: 11px 46px;
      background: transparent;
      border: 1px solid rgba(200,169,110,0.50);
      color: #f0d060;
      font-family: 'Georgia', serif;
      font-size: 0.68rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: letter-spacing 0.4s, box-shadow 0.4s, border-color 0.4s;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,140,0,0.14), rgba(255,160,20,0.10));
      opacity: 0;
      transition: opacity 0.35s;
    }

    .btn:hover:not(:disabled)::before { opacity: 1; }

    .btn:hover:not(:disabled) {
      letter-spacing: 0.50em;
      border-color: #c8a96e;
      box-shadow:
        0 0 22px rgba(200,169,110,0.38),
        0 0 55px rgba(200,169,110,0.12),
        inset 0 0 22px rgba(200,140,0,0.06);
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.32;
      cursor: default;
      border-color: rgba(200,169,110,0.18);
    }
  </style>
</head>
<body>

<div class="bg-img"></div>
<div class="nebula"></div>
<div class="overlay"></div>
<canvas id="cvs"></canvas>

<div class="content">

  <!-- Data -->
  <div class="date-line" id="dateLine"></div>
  <div class="day-line"  id="dayLine"></div>

  <!-- Percentuale anno -->
  <div class="pct">
    <span class="pct-num" id="pctNum">0.0</span>
    <span class="pct-sym">%</span>
  </div>

  <!-- 365 punti -->
  <div class="grid" id="grid"></div>

  <!-- Separatore -->
  <div class="divider"></div>

  <!-- Checklist -->
  <div class="checklist-title">Obiettivi di oggi</div>

  <div id="mainView" style="width:100%">
    <div class="task-list" id="taskList"></div>
    <div class="input-row">
      <input class="task-input" id="taskInput"
        placeholder="Aggiungi obiettivo…" maxlength="120" autocomplete="off" />
      <button class="add-btn" id="addBtn">+</button>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-icon">✦</div>
    <div class="done-title">Tutto completato</div>
    <div class="done-sub">A domani</div>
  </div>

  <!-- Bottone tracker -->
  <button class="btn" id="btn" onclick="segnaOggi()">Segna oggi</button>

</div>

<script>
/* ── Stelle + nebulosa animata ── */
(function () {
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  let W, H, stars = [], clusters = [], motes = [];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function build() {
    stars = []; clusters = []; motes = [];
    const n = Math.round(W * H / 3200);
    for (let i = 0; i < n; i++) {
      const warm = Math.random() > 0.55;
      stars.push({
        x: rand(0, W), y: rand(0, H),
        r: rand(0.3, 1.6), a: rand(0.18, 0.85),
        phase: rand(0, Math.PI * 2), freq: rand(0.006, 0.022),
        r1: warm ? 255 : 220, g1: warm ? rand(210, 245) : 230, b1: warm ? rand(150, 200) : 255
      });
    }
    for (let i = 0; i < 4; i++) {
      clusters.push({
        x: rand(0.1, 0.9) * W, y: rand(0.1, 0.9) * H,
        r: rand(40, 120), a: rand(0.04, 0.12),
        phase: rand(0, Math.PI * 2), freq: rand(0.003, 0.009),
        warm: Math.random() > 0.4
      });
    }
    for (let i = 0; i < 18; i++) {
      motes.push({
        x: rand(0, W), y: rand(0, H) + H,
        vy: rand(0.18, 0.70), vx: rand(-0.3, 0.3),
        r: rand(0.8, 2.4), a: rand(0.25, 0.68),
        phase: rand(0, Math.PI * 2)
      });
    }
  }

  function resize() {
    W = cvs.width  = window.innerWidth;
    H = cvs.height = window.innerHeight;
    build();
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    clusters.forEach(c => {
      c.phase += c.freq;
      const a = c.a * (0.6 + 0.4 * Math.sin(c.phase));
      const g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
      if (c.warm) {
        g.addColorStop(0, `rgba(255,200,80,${a})`);
        g.addColorStop(0.4, `rgba(255,120,20,${a * 0.5})`);
        g.addColorStop(1, 'rgba(255,80,0,0)');
      } else {
        g.addColorStop(0, `rgba(255,235,180,${a})`);
        g.addColorStop(0.5, `rgba(220,180,80,${a * 0.4})`);
        g.addColorStop(1, 'rgba(180,100,0,0)');
      }
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    });
    stars.forEach(s => {
      s.phase += s.freq;
      const a = s.a * (0.35 + 0.65 * Math.sin(s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.r1},${s.g1},${s.b1},${a})`; ctx.fill();
    });
    motes.forEach(m => {
      m.phase += 0.02; m.y -= m.vy; m.x += m.vx;
      if (m.y < -8) { m.y = H + 8; m.x = Math.random() * W; }
      const a = m.a * (0.45 + 0.55 * Math.sin(m.phase));
      const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 3.5);
      g.addColorStop(0, `rgba(255,200,60,${a})`); g.addColorStop(1, 'rgba(255,120,0,0)');
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    });
    requestAnimationFrame(frame);
  }

  resize();
  frame();
  window.addEventListener('resize', resize);
})();

/* ── Costanti ── */
const START      = new Date('2026-05-01T00:00:00');
const TOTAL      = 365;
const KEY_TRACK  = 'ilmondoemio_v2';
const KEY_TASKS  = 'daily_goals_v1';

/* ── Utilità data ── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayIdx() {
  const t = new Date(); t.setHours(0,0,0,0);
  const s = new Date(START); s.setHours(0,0,0,0);
  return Math.floor((t - s) / 86400000);
}

function fmtDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                  'luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const days   = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  const wd = days[new Date(y, m-1, d).getDay()];
  return `${wd}, ${d} ${months[m-1]} ${y}`;
}

/* ── Tracker storage ── */
function loadTrack() {
  try { return JSON.parse(localStorage.getItem(KEY_TRACK)) || { days: [] }; }
  catch { return { days: [] }; }
}
function saveTrack(d) { localStorage.setItem(KEY_TRACK, JSON.stringify(d)); }

/* ── Tasks storage ── */
function loadTasks() {
  try {
    const raw = localStorage.getItem(KEY_TASKS);
    const data = raw ? JSON.parse(raw) : {};
    if (data.date !== todayStr()) return { date: todayStr(), tasks: [] };
    return data;
  } catch { return { date: todayStr(), tasks: [] }; }
}
function saveTasks(d) { localStorage.setItem(KEY_TASKS, JSON.stringify(d)); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function allDone(tasks) { return tasks.length > 0 && tasks.every(t => t.done); }

/* ── Init tracker ── */
function initTracker() {
  const data = loadTrack();
  const ti = todayIdx();
  for (let i = 0; i < ti && i < TOTAL; i++) {
    if (!data.days.includes(i)) data.days.push(i);
  }
  saveTrack(data);
}

/* ── Segna oggi ── */
function segnaOggi() {
  const data = loadTrack();
  const ti = todayIdx();
  if (ti < 0 || ti >= TOTAL || data.days.includes(ti)) return;
  data.days.push(ti);
  saveTrack(data);
  const btn = document.getElementById('btn');
  btn.style.boxShadow = '0 0 50px rgba(255,180,48,0.8), 0 0 110px rgba(255,120,0,0.4)';
  setTimeout(() => { btn.style.boxShadow = ''; }, 800);
  renderAll();
}

/* ── Render tracker ── */
function renderTracker() {
  const data = loadTrack();
  const ti   = todayIdx();

  // Data + contatore giorni
  const today = todayStr();
  document.getElementById('dateLine').textContent = fmtDate(today).toUpperCase();
  const dayNum = ti + 1;
  const rimanenti = TOTAL - dayNum;
  document.getElementById('dayLine').textContent =
    dayNum >= 1 && dayNum <= TOTAL
      ? `Giorno ${dayNum} di ${TOTAL} · ${rimanenti} rimanenti`
      : '';

  // Percentuale
  document.getElementById('pctNum').textContent = (data.days.length / TOTAL * 100).toFixed(1);

  // Griglia punti
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (data.days.includes(i)) dot.classList.add('done');
    if (i === ti) dot.classList.add('today');
    dot.addEventListener('click', () => {
      const d = loadTrack();
      const x = d.days.indexOf(i);
      if (x === -1) d.days.push(i); else d.days.splice(x, 1);
      saveTrack(d); renderAll();
    });
    frag.appendChild(dot);
  }
  grid.appendChild(frag);

  // Bottone
  const btn    = document.getElementById('btn');
  const inRange = ti >= 0 && ti < TOTAL;
  const marked  = data.days.includes(ti);
  btn.disabled  = !inRange || marked;
  btn.textContent = marked ? 'Giorno segnato ✦' : 'Segna oggi';
}

/* ── Render checklist ── */
function renderChecklist() {
  const data = loadTasks();
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (data.tasks.length === 0) {
    const el = document.createElement('div');
    el.className = 'empty-state';
    el.textContent = 'Nessun obiettivo — aggiungine uno';
    list.appendChild(el);
  } else {
    data.tasks.forEach((task, i) => {
      const el = document.createElement('div');
      el.className = 'task-item' + (task.done ? ' done' : '');
      el.innerHTML = `
        <div class="circle">
          <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none"
            stroke="#07050e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,5 4,7.5 8.5,2"/>
          </svg>
        </div>
        <span class="task-text">${esc(task.text)}</span>`;
      el.addEventListener('click', () => toggleTask(i));
      list.appendChild(el);
    });
  }

  const mainView = document.getElementById('mainView');
  const doneScr  = document.getElementById('doneScreen');

  if (allDone(data.tasks)) {
    mainView.style.display = 'none';
    doneScr.classList.add('visible');
  } else {
    mainView.style.display = 'block';
    doneScr.classList.remove('visible');
  }
}

function renderAll() { renderTracker(); renderChecklist(); }

/* ── Azioni checklist ── */
function addTask() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();
  if (!text) return;
  const data = loadTasks();
  data.tasks.push({ text, done: false });
  saveTasks(data);
  input.value = '';
  renderChecklist();
  input.focus();
}

function toggleTask(index) {
  const data = loadTasks();
  data.tasks[index].done = !data.tasks[index].done;
  saveTasks(data);

  if (allDone(data.tasks)) {
    renderChecklist();
    const mainView = document.getElementById('mainView');
    mainView.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    mainView.style.opacity = '0';
    mainView.style.transform = 'translateY(-6px)';
    setTimeout(() => {
      mainView.style.display = 'none';
      mainView.style.opacity = '';
      mainView.style.transform = '';
      document.getElementById('doneScreen').classList.add('visible');
      setTimeout(() => {
        const d = loadTasks(); d.tasks = []; saveTasks(d);
        document.getElementById('doneScreen').classList.remove('visible');
        renderChecklist();
        document.getElementById('taskInput').focus();
      }, 2800);
    }, 420);
  } else {
    renderChecklist();
  }
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

/* ── Avvio ── */
initTracker();
renderAll();
</script>
